<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Checkout</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:40px;
    }

    .checkout-container{
      max-width:1000px;
      margin:auto;
      background:white;
      padding:40px;
      display:flex;
      gap:40px;
      flex-wrap:wrap;
    }

    .left-side{
      flex:1;
      min-width:300px;
    }

    .right-side{
      flex:1;
      min-width:300px;
    }

    h1{
      margin-bottom:25px;
      font-size:38px;
    }

    .product-box{
      border:1px solid #ddd;
      padding:20px;
      margin-bottom:30px;
    }

    .product-box h2{
      margin-bottom:10px;
    }

    .product-box p{
      margin-bottom:8px;
      color:#555;
    }

    .payment-title{
      margin-bottom:20px;
      font-size:24px;
      font-weight:bold;
    }

    .payment-option{
      border:1px solid #ccc;
      padding:18px;
      margin-bottom:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .payment-option:hover{
      border-color:black;
    }

    .payment-option.active{
      border:2px solid black;
      background:#f7f7f7;
    }

    .pay-btn{
      width:100%;
      height:60px;
      background:black;
      color:white;
      border:none;
      font-size:18px;
      cursor:pointer;
      margin-top:20px;
    }

    .pay-btn:hover{
      background:#222;
    }

    .payment-form{
      margin-top:25px;
    }

    input{
      width:100%;
      height:50px;
      margin-bottom:15px;
      padding:12px;
      border:1px solid #ccc;
      font-size:16px;
    }

    .success-message{
      display:none;
      margin-top:20px;
      padding:15px;
      background:#d4edda;
      color:#155724;
      border:1px solid #c3e6cb;
    }

  </style>
</head>

<body>

  <div class="checkout-container">

    <!-- LEFT -->
    <div class="left-side">

      <h1>Checkout</h1>

      <div class="product-box">

        <h2 id="productName">Product</h2>

        <p id="productSize"></p>

        <p id="productPrice"></p>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="right-side">

      <div class="payment-title">
        Select Payment Method
      </div>

      <!-- MOMO -->
      <div class="payment-option" data-method="MoMo">
        📱 MTN MoMo
      </div>

      <!-- CARD -->
      <div class="payment-option" data-method="Card">
        💳 Credit / Debit Card
      </div>

      <!-- PAYPAL -->
      <div class="payment-option" data-method="PayPal">
        🅿️ PayPal
      </div>

      <!-- BANK -->
      <div class="payment-option" data-method="Bank">
        🏦 Bank Transfer
      </div>

      <!-- FORM -->
      <div class="payment-form">

        <input type="text" id="fullName" placeholder="Full Name">

        <input type="text" id="phoneOrCard" placeholder="Phone Number or Card Number">

      </div>

      <button class="pay-btn" id="payBtn">
        COMPLETE PAYMENT
      </button>

      <div class="success-message" id="successMessage">
        ✅ Payment successful! Thank you for your order.
      </div>

    </div>

  </div>

  <script>

    // LOAD PRODUCT FROM LOCAL STORAGE
    const product = JSON.parse(localStorage.getItem("checkoutItem"));

    if(product){

      document.getElementById("productName").innerText = product.name;

      document.getElementById("productSize").innerText =
        "Size: " + product.size;

      document.getElementById("productPrice").innerText =
        "Price: " + product.price.toLocaleString() + " RWF";

    }

    // PAYMENT METHOD SELECTION
    const paymentOptions =
      document.querySelectorAll(".payment-option");

    let selectedMethod = "";

    paymentOptions.forEach(option => {

      option.addEventListener("click", function(){

        paymentOptions.forEach(opt =>
          opt.classList.remove("active"));

        this.classList.add("active");

        selectedMethod = this.dataset.method;

      });

    });

    // PAYMENT BUTTON
    document.getElementById("payBtn")
      .addEventListener("click", function(){

      const fullName =
        document.getElementById("fullName").value;

      const phoneOrCard =
        document.getElementById("phoneOrCard").value;

      if(!selectedMethod){
        alert("Please select a payment method.");
        return;
      }

      if(fullName === "" || phoneOrCard === ""){
        alert("Please fill all payment details.");
        return;
      }

      // SIMULATED PAYMENT
      document.getElementById("successMessage")
        .style.display = "block";

      console.log({
        customer: fullName,
        paymentMethod: selectedMethod,
        paymentInfo: phoneOrCard,
        product: product
      });

    });

  </script>

</body>
</html>
