<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Luxe - Booking</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f2e7; /* cream */
      color: #3e2723; /* dark chocolate */
      margin: 0;
      padding: 0;
    }

    .navbar {
      background-color: #6d4c41; /* milk chocolate */
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .logo {
      color: #fff3e0;
      font-size: 20px;
      font-weight: bold;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    .navbar li {
      margin: 0 10px;
    }

    .navbar a {
      color: #fff3e0;
      text-decoration: none;
    }

    .booking-container {
      max-width: 500px;
      margin: 50px auto;
      background-color: #d7ccc8; /* light mocha */
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(61, 33, 20, 0.4);
    }

    h2 {
      text-align: center;
      color: #5d4037;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #8d6e63;
      border-radius: 4px;
    }

    button {
      background-color: #8d6e63; /* mocha */
      color: white;
      border: none;
      padding: 10px;
      margin-top: 15px;
      width: 48%;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background-color: #5d4037; /* dark cocoa */
    }

    .button-group {
      display: flex;
      justify-content: space-between;
    }

    footer {
      background-color: #6d4c41;
      color: #fff3e0;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">Hotel Luxe</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="rooms.html">Rooms</a></li>
      <li><a href="booking.html">Booking</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="signup.html">Sign Up</a></li>
    </ul>
  </nav>

  <!-- Booking Form -->
  <div class="booking-container">
    <h2>Book Your Stay</h2>
    <form>
      <label>Check-in Date:</label>
      <input type="date" required>
      <label>Check-out Date:</label>
      <input type="date" required>
      <label>Room Type:</label>
      <select required>
        <option value="">-- Select Room --</option>
        <option>Deluxe</option>
        <option>Suite</option>
      </select>
      <label>Guests:</label>
      <input type="number" min="1" max="6" required>
      <div class="button-group">
        <button type="submit">Confirm Booking</button>
        <button type="button" onclick="window.print()">Print Booking</button>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Hotel Luxe. All rights reserved.</p>
  </footer>
</body>
</html>
