<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Luxe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f2e7;
      color: #3e2723;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
    }

    .navbar {
      background-color: #6d4c41;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .logo {
      color: #fff3e0;
      font-size: 20px;
      font-weight: bold;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    .navbar li {
      margin: 0 10px;
    }

    .navbar a {
      color: #fff3e0;
      text-decoration: none;
    }

    /* Banner adjustments */
    .banner {
      background-color: #3e2723;
      position: absolute;
      top: 10px;
      left: 10px;
    }

    .banner img {
      width: 150px;   /* reduced size */
      height: auto;   /* keep proportions */
      object-fit: contain;
      display: block;
    }

    .rooms {
      padding: 20px;
      display: flex;
      justify-content: space-around;
    }

    .rooms img {
      width: 250px;
      border-radius: 8px;
    }

    .booking {
      padding: 20px;
      background-color: #d7ccc8;
    }

    button {
      background-color: #8d6e63;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #5d4037;
    }

    footer {
      background-color: #6d4c41;
      color: #fff3e0;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Hotel Luxe</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="rooms.html">Rooms</a></li>
      <li><a href="booking.html">Booking</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="signup.html">Sign Up</a></li>
    </ul>
  </nav>

  <main>
    <header class="banner">
      <img src="logo.png" alt="Hotel Banner">
    </header>

    <section class="rooms">
      <div>
        <img src="deluse.png" alt="Deluxe Room">
        <p>Deluxe Room - $120/night</p>
      </div>
      <div>
        <img src="pres.png" alt="Suite">
        <p>Suite - $200/night</p>
      </div>
    </section>

    <section class="booking">
      <h2>Book Your Stay</h2>
      <form>
        <label>Check-in:</label>
        <input type="date" required>
        <label>Check-out:</label>
        <input type="date" required>
        <label>Room Type:</label>
        <select>
          <option>Deluxe</option>
          <option>Suite</option>
        </select>
        <button type="submit">Confirm Booking</button>
        <button type="button" onclick="window.print()">Print Booking</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Hotel Luxe. All rights reserved.</p>
  </footer>
</body>
</html>
